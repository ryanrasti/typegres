name: CI
on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Start Postgres and run checks
        run: |
          set -e
          # Real GHA runs as `runner`. `act` runs as root, which breaks
          # initdb. Drop the whole step to an unprivileged user so both
          # environments behave the same. `runuser` is used instead of
          # `su` because some container images lack the PAM config `su`
          # wants.
          if [ "$(id -u)" = "0" ]; then
            id pgrunner >/dev/null 2>&1 || useradd -m -s /bin/bash pgrunner
            chown -R pgrunner:pgrunner "$PWD"
            RUN=(runuser -u pgrunner -- bash -lc)
          else
            RUN=(bash -c)
          fi
          "${RUN[@]}" "cd '$PWD' && nix develop --command bash -c 'set -e; bin/startpg; npm ci; (cd examples/basic && npm ci); npm run codegen:check; npm run check'"

  site:
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: |
          nix develop --command bash -c '
            set -euo pipefail
            npm ci
            (cd site && npm ci && npm run build)
          '
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site/out
      - id: deployment
        uses: actions/deploy-pages@v4

  publish:
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - uses: actions/setup-node@v4
        with:
          registry-url: 'https://registry.npmjs.org'
      - run: |
          nix develop --command bash -c '
            set -euo pipefail
            npm ci
            npm run build
          '
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
